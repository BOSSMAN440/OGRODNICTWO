<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sezon Zimowy - Usługi Ogrodnicze Łódź</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f4f7f4;
}

.header{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1608889175123-8b7b6c1a6c02?auto=format&fit=crop&w=1600');
background-size:cover;
color:white;
text-align:center;
padding:120px 20px;
}

.container{
max-width:1100px;
margin:auto;
padding:50px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.btn{
display:inline-block;
padding:12px 20px;
background:#1b5e20;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:15px;
}
</style>

</head>

<body>

<div class="header">
<h1>❄️ Sezon Zimowy</h1>
<p>Odśnieżanie i zimowe usługi porządkowe</p>
</div>

<div class="container">

<h2>Usługi zimowe</h2>

<div class="cards">

<div class="card">
<h3>❄️ Odśnieżanie posesji</h3>
<p>Chodniki, podjazdy i parkingi.</p>
</div>

<div class="card">
<h3>🧂 Posypywanie solą</h3>
<p>Bezpieczeństwo w czasie mrozów.</p>
</div>

<div class="card">
<h3>🏠 Odśnieżanie dachów</h3>
<p>Usuwanie śniegu z budynków.</p>
</div>

<div class="card">
<h3>🚜 Usługi interwencyjne</h3>
<p>Wyjazdy po intensywnych opadach.</p>
</div>

</div>

<a class="btn" href="index.html">← Powrót</a>

</div>

</body>
</html>
