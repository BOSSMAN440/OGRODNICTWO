<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Usługi Ogrodnicze Łódź i okolice</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#f4f7f4;
    color:#333;
    line-height:1.6;
}

nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(6px);
    z-index:1000;
}

.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{color:white;font-size:22px;font-weight:700;}

nav ul{display:flex;gap:20px;list-style:none;}

nav ul li a{color:white;text-decoration:none;}

.hero{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1599685315640-9ceab2f8a5f7?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.hero h1{font-size:50px;}

.btn{
    display:inline-block;
    padding:14px 28px;
    background:#2f7d32;
    color:white;
    border-radius:10px;
    text-decoration:none;
    margin-top:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:80px 20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.testimonial{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.review-form{
    background:white;
    padding:25px;
    border-radius:15px;
    margin-top:20px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-top:15px;
    padding:12px 20px;
    background:#2f7d32;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.contact{
    background:#2f7d32;
    color:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

footer{
    background:#111;
    color:#aaa;
    text-align:center;
    padding:30px;
}
</style>
</head>

<body>

<nav>
<div class="nav-container">
<div class="logo">🌿 OGRODNICTWO</div>
<ul>
<li><a href="#uslugi">Usługi</a></li>
<li><a href="#opinie">Opinie</a></li>
<li><a href="#kontakt">Kontakt</a></li>
</ul>
</div>
</nav>

<section class="hero">
<div>
<h1>Usługi Ogrodnicze Łódź</h1>
<p>Profesjonalne prace ogrodowe</p>
<a class="btn" href="tel:+48571021769">Zadzwoń</a>
</div>
</section>

<section class="container" id="uslugi">
<h2>Usługi</h2>
<div class="cards">
<div class="card">Koszenie trawy</div>
<div class="card">Porządki działek</div>
<div class="card">Altany</div>
<div class="card">Sprzątanie terenów</div>
</div>
</section>

<section class="container" id="opinie">
<h2>Opinie klientów</h2>

<div id="reviewsContainer"></div>

<div class="review-form">
<h3>Dodaj opinię</h3>
<input id="name" placeholder="Imię">
<textarea id="review" placeholder="Opinia"></textarea>
<button onclick="addReview()">Dodaj</button>
</div>
</section>

<section class="container" id="kontakt">
<div class="contact">
<h2>Kontakt</h2>
<p>📞 571 021 769</p>
</div>
</section>

<footer>© 2026 Ogrodnictwo</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// 🔥 WSTAW SWOJE DANE Z FIREBASE
const firebaseConfig = {
    apiKey: "TWOJ_API_KEY",
    authDomain: "TWOJ_PROJECT.firebaseapp.com",
    projectId: "TWOJ_PROJECT_ID",
    storageBucket: "TWOJ_PROJECT.appspot.com",
    messagingSenderId: "XXX",
    appId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const reviewsRef = db.collection("reviews");

const container = document.getElementById("reviewsContainer");

// ➕ dodawanie opinii
function addReview() {
    const name = document.getElementById("name").value.trim();
    const review = document.getElementById("review").value.trim();

    if(!name || !review){
        alert("Uzupełnij dane");
        return;
    }

    reviewsRef.add({
        name,
        review,
        created: new Date()
    });

    document.getElementById("name").value = "";
    document.getElementById("review").value = "";
}

// 📡 live opinie
reviewsRef.orderBy("created","desc").onSnapshot(snapshot => {
    container.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        const div = document.createElement("div");
        div.classList.add("testimonial");

        div.innerHTML = `
        ⭐⭐⭐⭐⭐<br><br>
        "${d.review}"<br><br>
        <strong>- ${d.name}</strong>
        `;

        container.appendChild(div);
    });
});
</script>

</body>
</html>
